name: Build Windows .exe

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"          # also triggers on version tags like v1.0.0
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    name: Build CashRegister.exe
    runs-on: windows-latest   # GitHub's Windows 11-compatible runner

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Python 3.11 ships with tkinter on Windows runners; no extra install needed.

      # ── 3. Install build dependencies ────────────────────────────────────────
      - name: Install PyInstaller
        run: pip install -r requirements-build.txt

      # ── 4. Extract Version ───────────────────────────────────────────────────
      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '__version__ =' cash_register/version.py | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ── 5. Build executable ───────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "CashRegister-v${{ steps.get_version.outputs.VERSION }}" `
            --icon "edit_icon.ico" `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.messagebox `
            --hidden-import tkinter.simpledialog `
            --clean `
            run.py

      # ── 6. Upload artifact ────────────────────────────────────────────────────
      - name: Upload CashRegister.exe
        uses: actions/upload-artifact@v4
        with:
          name: CashRegister-v${{ steps.get_version.outputs.VERSION }}-Windows
          path: dist/CashRegister-v${{ steps.get_version.outputs.VERSION }}.exe
          if-no-files-found: error   # fail the job if the .exe wasn't created

      # ── 7. Create a GitHub Release (only on version tags) ────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CashRegister-v${{ steps.get_version.outputs.VERSION }}.exe
          name: Cash Register ${{ github.ref_name }}
          body: |
            ## Cash Register ${{ github.ref_name }}

            Download **CashRegister.exe** below and run it on any Windows 11 machine.
            No Python installation required.
